<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AbideWord — Reset Password</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}"/>
</head>
<body>

<div class="card" role="main">

  <!-- Logo area -->
  <div class="logo-area">
    <div class="logo-box">
      <!-- Book / Word icon -->
      <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="6" y="4" width="18" height="26" rx="2" fill="#FAEEDA" opacity="0.15"/>
        <path d="M8 6h14a2 2 0 012 2v20l-9-4-9 4V8a2 2 0 012-2z" fill="#FAEEDA"/>
        <path d="M12 13h8M12 17h5" stroke="#EF9F27" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      <div class="logo-dot"></div>
    </div>
    <div class="brand-name">AbideWord</div>
  </div>

  <form action="/admin/reset-password" method="POST" novalidate>

    <div class="field">
      <label for="email">Email address</label>
      <div class="input-wrap">
        <input type="email" id="email" name="email" placeholder="you@truedisciple.org" autocomplete="email" required />
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <path d="M2 7l10 7 10-7"/>
        </svg>
      </div>
    </div>

    <button type="submit" class="btn">
      Send Reset Link
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M5 12h14M13 6l6 6-6 6"/>
      </svg>
    </button>

  </form>

  <div class="card-footer">
    <p>Remember your password? <a href="/signin">Sign in</a></p>
  </div>

</div>

</body>
</html>
