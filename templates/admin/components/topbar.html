<!-- TOPBAR -->
<header class="topbar">
  <button class="hamburger" onclick="openSidebar()">
    <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
  <span class="page-title" id="pageLabel">Dashboard</span>

  <div class="topbar-right">
    <!-- Theme toggle -->
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark mode" id="themeBtn">
      <svg id="themeIcon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
    </button>

    <!-- Notifications -->
    <button class="icon-btn" onclick="toggleNotif()" title="Notifications">
      <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
      <span class="notif-dot"></span>
    </button>

    <!-- Profile chip -->
    <div class="profile-chip">
      <div class="chip-avatar">
        {% if current_user.photo %}
          <img src="{{ url_for('static', filename='uploads/users/' + current_user.photo) }}" alt="{{ current_user.name }}"/>
        {% else %}
          {{ current_user.name[:2].upper() }}
        {% endif %}
      </div>
      <button class="chip-drop" onclick="toggleProfileDrop()">
        <svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
      </button>
    </div>

    <!-- PROFILE DROPDOWN -->
    <div class="profile-dropdown" id="profileDrop">
      <a href="/admin/profile" class="profile-dropdown-item">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        My Profile
      </a>
      <!-- <a href="/logout" class="profile-dropdown-item">
        <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sign out
      </a> -->
    </div>
  </div>
</header>

<script>
function toggleProfileDrop(){
  document.getElementById('profileDrop').classList.toggle('open');
}

// Close dropdown when clicking outside
document.addEventListener('click', function(e){
  const profileDrop = document.getElementById('profileDrop');
  const profileChip = document.querySelector('.profile-chip');
  if (!profileDrop.contains(e.target) && !profileChip.contains(e.target)) {
    profileDrop.classList.remove('open');
  }
});
</script>

<!-- NOTIF DROPDOWN -->
<div class="notif-dropdown" id="notifDrop">
  <div class="notif-dh">
    Notifications
    <span class="notif-clear">Clear all</span>
  </div>
  <div class="notif-item">
    <div class="notif-item-title"><span class="notif-dot-blue"></span>New topic draft saved</div>
    <div class="notif-item-sub">2 minutes ago</div>
  </div>
  <div class="notif-item">
    <div class="notif-item-title"><span class="notif-dot-blue"></span>Category "Prayer" updated</div>
    <div class="notif-item-sub">1 hour ago</div>
  </div>
  <div class="notif-item">
    <div class="notif-item-title"><span class="notif-dot-blue"></span>AbideWord v1.0 is live</div>
    <div class="notif-item-sub">Today</div>
  </div>
</div>
